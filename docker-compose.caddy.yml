services:
  backend:
    build:
      context: .
    restart: always
    env_file:
      - .env.server
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - backend

  caddy:
    image: caddy:2.8-alpine
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env.server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
