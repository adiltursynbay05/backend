services:
  backend:
    build:
      context: .
    restart: always
    env_file:
      - .env.server
    environment:
      NODE_ENV: production
      PORT: ${PORT:-5000}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
